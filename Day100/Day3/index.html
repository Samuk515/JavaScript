<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedding JavaScritpt with HTML</title>
</head>
<body>
    <h1> Embedding JavaScript with HTML</h1>
    <p> This is a simple example of how to embed JavaScript within an HTML document.</p>
    <span id="message"></span>
    <span id="ram"> </span>
    <!-- internal javascript -->
     <ul id="datalist"></ul>
    <script>
        // console.log() is a method used to print messages to the console for debugging purposes.
        console.log("Hello.  this isa message from the JavaScript code embedded in the HTML document!");
        // defining html element with id "message" and assigining it to a variable
        const messageElement = document.getElementById("message");
        // setting the text content of the message element to string
        messageElement.textContent = "This message is displayed using JavaScript!";
        // calcultation wiht arithmetic operators
        const markedPrice = 125.25;
        const discount = 0.15; // 15% discount
        const vatAmount = markedPrice * 0.05;
        const discountAmount = markedPrice * discount; // calcutate discount amount
        const finalPrice = markedPrice - discountAmount + vatAmount; // calculate final price
        console.log("Final price after discount and VAT:" + finalPrice.toFixed(2)); // Log the final price to the console with 2 decimal
        const ramElement = document.getElementById("ram");
        ramElement.textContent = "The final price after discount and VAT is: " + finalPrice.toFixed(2);
    </script>
    <!-- external javascript file -->
    <script src="data.js"></script>

</body>
</html>
